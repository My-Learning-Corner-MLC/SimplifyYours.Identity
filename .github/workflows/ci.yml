name: Identity Service CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Restore, build, and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore IdentityService.sln

      - name: Build
        run: dotnet build IdentityService.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test IdentityService.sln --configuration Release --no-build /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura /p:Threshold=80 /p:ThresholdType=line /p:ThresholdStat=total
