name: Identity Service CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Restore, build, and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore IdentityService.sln

      - name: Build
        run: dotnet build IdentityService.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test IdentityService.sln --configuration Release --no-build /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura /p:CoverletOutput=${{ github.workspace }}/TestResults/coverage.cobertura.xml

      - name: Diff coverage (changed lines only, fail under 50%)
        if: github.event_name == 'pull_request'
        run: |
          pipx install diff-cover
          git fetch origin "${{ github.event.pull_request.base.ref }}" --depth=1
          diff-cover "${{ github.workspace }}/TestResults/coverage.cobertura.xml" \
            --compare-branch="origin/${{ github.event.pull_request.base.ref }}" \
            --fail-under=50
